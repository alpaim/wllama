name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build WASM
        run: |
          cd scripts
          ./build_wasm.sh

      - name: Build glue code
        run: npm run build:glue

      - name: Build package
        run: npm run build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp src/single-thread/wllama.wasm release-artifacts/wllama-single-thread.wasm
          cp src/multi-thread/wllama.wasm release-artifacts/wllama-multi-thread.wasm
          npm pack
          TARBALL=$(ls *.tgz)
          mv "$TARBALL" "release-artifacts/alpaim-wllama-${{ steps.get_version.outputs.VERSION }}.tgz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          generate_release_notes: true